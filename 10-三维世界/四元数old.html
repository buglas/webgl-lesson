    const P1 = new Vector3(1, 2, 3)

    //x
    /* {

    //x
    /* {

    //y
    /* {
      const mz = new Matrix4().makeRotationZ(ang)
      const angY = Math.atan2(axis.x, axis.z)

    //xy
    {
      const mz = new Matrix4().makeRotationZ(ang)
      const angX = Math.atan2(axis.y, axis.z)
      const mx1 = new Matrix4().makeRotationX(angX)
      const mx2 = new Matrix4().makeRotationX(-angX)

      const axis2 = axis.clone()
      axis2.applyMatrix4(mx1)

      const angY = Math.atan2(axis2.x, axis2.z)
      const my1 = new Matrix4().makeRotationY(angY)
      const my2 = new Matrix4().makeRotationY(-angY)

      const P2 = P1.clone()
      P2.applyMatrix4(mx1)
      P2.applyMatrix4(my2)
      P2.applyMatrix4(mz)
      P2.applyMatrix4(my1)
      P2.applyMatrix4(mx2)
      console.log(P2);
      console.log(P2.length());
    }

    {
      const quaternion = new Quaternion()
      quaternion.setFromAxisAngle(axis, ang)
      const m = new Matrix4()
      m.makeRotationFromQuaternion(quaternion)
      const P2 = P1.clone().applyMatrix4(m)
      console.log(P2);
      console.log(P2.length());
    }
  </script>
